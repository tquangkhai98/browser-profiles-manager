name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g. v1.0.0)'
        required: true
        type: string

permissions:
  contents: write

env:
  GO_MODULE: github.com/tquangkhai98/browser-profiles-manager

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: macos-latest
            platform: darwin/universal
            cli_build: universal
          - os: windows-latest
            platform: windows/amd64
            cli_build: amd64

    name: Build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version-file: 'go.mod'

      - name: Install Wails CLI
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest

      - name: Extract version
        id: version
        shell: bash
        run: |
          VERSION=${{ inputs.version }}
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "Building ${VERSION}"

      # ── CLI ──
      - name: Build CLI (macOS universal)
        if: runner.os == 'macOS'
        shell: bash
        run: |
          GOARCH=arm64 go build -ldflags "-s -w -X $GO_MODULE/cmd.version=${{ steps.version.outputs.version }}" -o bpm-arm64 .
          GOARCH=amd64 go build -ldflags "-s -w -X $GO_MODULE/cmd.version=${{ steps.version.outputs.version }}" -o bpm-amd64 .
          lipo -create -output bpm bpm-arm64 bpm-amd64

      - name: Build CLI (Windows)
        if: runner.os == 'Windows'
        run: go build -ldflags "-s -w -X ${{ env.GO_MODULE }}/cmd.version=${{ steps.version.outputs.version }}" -o bpm.exe .

      # ── Desktop ──
      - name: Build Desktop app
        working-directory: desktop
        run: wails build -platform ${{ matrix.platform }}

      # ── Package (macOS) ──
      - name: Package macOS
        if: runner.os == 'macOS'
        run: |
          VERSION=${{ steps.version.outputs.version }}
          brew install create-dmg
          create-dmg \
            --volname "BPM" \
            --volicon "desktop/build/appicon.png" \
            --window-pos 200 120 \
            --window-size 660 400 \
            --icon-size 120 \
            --icon "BPM.app" 160 190 \
            --app-drop-link 500 190 \
            --hide-extension "BPM.app" \
            --no-internet-enable \
            "BPM-${VERSION}-macos-universal.dmg" \
            "desktop/build/bin/BPM.app"
          tar -czf bpm-${VERSION}-macos-universal.tar.gz bpm

      # ── Package (Windows) ──
      - name: Package Windows
        if: runner.os == 'Windows'
        shell: bash
        run: |
          VERSION=${{ steps.version.outputs.version }}
          7z a BPM-${VERSION}-windows-amd64.zip ./desktop/build/bin/BPM.exe
          7z a bpm-${VERSION}-windows-amd64.zip ./bpm.exe

      # ── Upload artifacts ──
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ runner.os }}
          path: |
            BPM-*
            bpm-*
          if-no-files-found: error

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: Extract version
        id: version
        run: echo "version=${{ inputs.version }}" >> $GITHUB_OUTPUT

      - name: Generate checksums
        run: sha256sum BPM-* bpm-* > checksums.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          generate_release_notes: true
          body: |
            ## BPM ${{ steps.version.outputs.version }}

            ### Downloads

            | File | Platform | Description |
            |------|----------|-------------|
            | `BPM-...-macos-universal.dmg` | macOS (Universal) | 🖥️ Desktop app |
            | `BPM-...-windows-amd64.zip` | Windows x64 | 🖥️ Desktop app |
            | `bpm-...-macos-universal.tar.gz` | macOS (Universal) | ⌨️ CLI |
            | `bpm-...-windows-amd64.zip` | Windows x64 | ⌨️ CLI |

            ### Installation

            **macOS:** Open `.dmg`, drag **BPM** to **Applications**.
            First launch → **System Settings → Privacy & Security → Open Anyway**.

            **Windows:** Extract `.zip` and run `BPM.exe`.

            **CLI:** Extract and add to your PATH.
          files: |
            BPM-*
            bpm-*
            checksums.txt
