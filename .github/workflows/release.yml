name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release-macos:
    name: Build & Release (macOS Universal)
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: 'go.mod'

      - name: Install Wails CLI
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest

      - name: Install create-dmg
        run: brew install create-dmg

      - name: Extract version info
        id: version
        run: |
          VERSION=${GITHUB_REF#refs/tags/}
          COMMIT=$(git rev-parse --short HEAD)
          DATE=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "commit=${COMMIT}" >> $GITHUB_OUTPUT
          echo "date=${DATE}" >> $GITHUB_OUTPUT
          echo "Building ${VERSION} (${COMMIT}) at ${DATE}"

      # ── CLI: Universal binary via lipo ──
      - name: Build CLI (arm64)
        env:
          GOARCH: arm64
        run: |
          go build \
            -ldflags "-s -w \
              -X github.com/tquangkhai98/browser-profiles-manager/cmd.version=${{ steps.version.outputs.version }} \
              -X github.com/tquangkhai98/browser-profiles-manager/cmd.commit=${{ steps.version.outputs.commit }} \
              -X github.com/tquangkhai98/browser-profiles-manager/cmd.date=${{ steps.version.outputs.date }}" \
            -o bpm-arm64 .

      - name: Build CLI (amd64)
        env:
          GOARCH: amd64
        run: |
          go build \
            -ldflags "-s -w \
              -X github.com/tquangkhai98/browser-profiles-manager/cmd.version=${{ steps.version.outputs.version }} \
              -X github.com/tquangkhai98/browser-profiles-manager/cmd.commit=${{ steps.version.outputs.commit }} \
              -X github.com/tquangkhai98/browser-profiles-manager/cmd.date=${{ steps.version.outputs.date }}" \
            -o bpm-amd64 .

      - name: Create CLI universal binary
        run: lipo -create -output bpm bpm-arm64 bpm-amd64

      # ── Desktop: Universal .app via Wails ──
      - name: Build Desktop app (universal)
        working-directory: desktop
        run: wails build -platform darwin/universal

      # ── Package ──
      - name: Package CLI
        run: |
          VERSION=${{ steps.version.outputs.version }}
          tar -czf bpm-${VERSION}-darwin-universal.tar.gz bpm

      - name: Create DMG
        run: |
          VERSION=${{ steps.version.outputs.version }}
          create-dmg \
            --volname "BPM Desktop" \
            --volicon "desktop/build/appicon.png" \
            --window-pos 200 120 \
            --window-size 660 400 \
            --icon-size 120 \
            --icon "bpm-desktop.app" 160 190 \
            --app-drop-link 500 190 \
            --hide-extension "bpm-desktop.app" \
            --no-internet-enable \
            "bpm-desktop-${VERSION}-darwin-universal.dmg" \
            "desktop/build/bin/bpm-desktop.app"

      - name: Generate checksums
        run: |
          VERSION=${{ steps.version.outputs.version }}
          shasum -a 256 \
            bpm-${VERSION}-darwin-universal.tar.gz \
            bpm-desktop-${VERSION}-darwin-universal.dmg \
            > checksums-${VERSION}-darwin.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          generate_release_notes: true
          body: |
            ## BPM ${{ steps.version.outputs.version }}

            ### Downloads (macOS Universal — Apple Silicon + Intel)

            | File | Description |
            |------|-------------|
            | `bpm-desktop-${{ steps.version.outputs.version }}-darwin-universal.dmg` | 🖥️ Desktop app (DMG installer) |
            | `bpm-${{ steps.version.outputs.version }}-darwin-universal.tar.gz` | ⌨️ CLI binary |

            ### Installation

            **Desktop:**
            1. Download the `.dmg` file
            2. Open it and drag **BPM Desktop** to **Applications**
            3. On first launch: **System Settings → Privacy & Security → Open Anyway**

            **CLI:**
            ```bash
            tar -xzf bpm-${{ steps.version.outputs.version }}-darwin-universal.tar.gz
            sudo mv bpm /usr/local/bin/
            ```
          files: |
            bpm-desktop-${{ steps.version.outputs.version }}-darwin-universal.dmg
            bpm-${{ steps.version.outputs.version }}-darwin-universal.tar.gz
            checksums-${{ steps.version.outputs.version }}-darwin.txt
