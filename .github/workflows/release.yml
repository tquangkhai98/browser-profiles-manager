name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release-macos:
    name: Build & Release (macOS)
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: 'go.mod'

      - name: Install Wails CLI
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest

      - name: Install create-dmg
        run: brew install create-dmg

      - name: Extract version info
        id: version
        run: |
          VERSION=${GITHUB_REF#refs/tags/}
          COMMIT=$(git rev-parse --short HEAD)
          DATE=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "commit=${COMMIT}" >> $GITHUB_OUTPUT
          echo "date=${DATE}" >> $GITHUB_OUTPUT
          echo "Building ${VERSION} (${COMMIT}) at ${DATE}"

      # ── CLI binaries ──
      - name: Build CLI (arm64)
        env:
          GOARCH: arm64
        run: |
          go build \
            -ldflags "-s -w \
              -X github.com/tquangkhai98/browser-profiles-manager/cmd.version=${{ steps.version.outputs.version }} \
              -X github.com/tquangkhai98/browser-profiles-manager/cmd.commit=${{ steps.version.outputs.commit }} \
              -X github.com/tquangkhai98/browser-profiles-manager/cmd.date=${{ steps.version.outputs.date }}" \
            -o bpm-arm64 .

      - name: Build CLI (amd64)
        env:
          GOARCH: amd64
        run: |
          go build \
            -ldflags "-s -w \
              -X github.com/tquangkhai98/browser-profiles-manager/cmd.version=${{ steps.version.outputs.version }} \
              -X github.com/tquangkhai98/browser-profiles-manager/cmd.commit=${{ steps.version.outputs.commit }} \
              -X github.com/tquangkhai98/browser-profiles-manager/cmd.date=${{ steps.version.outputs.date }}" \
            -o bpm-amd64 .

      - name: Create CLI universal binary
        run: lipo -create -output bpm bpm-arm64 bpm-amd64

      # ── Desktop: Universal build ──
      - name: Build Desktop app (universal)
        working-directory: desktop
        run: wails build -platform darwin/universal

      - name: Create DMG (Universal)
        run: |
          VERSION=${{ steps.version.outputs.version }}
          create-dmg \
            --volname "BPM" \
            --volicon "desktop/build/appicon.png" \
            --window-pos 200 120 \
            --window-size 660 400 \
            --icon-size 120 \
            --icon "BPM.app" 160 190 \
            --app-drop-link 500 190 \
            --hide-extension "BPM.app" \
            --no-internet-enable \
            "BPM-${VERSION}-darwin-universal.dmg" \
            "desktop/build/bin/BPM.app"

      # ── Desktop: x86_64 build ──
      - name: Build Desktop app (x86_64)
        working-directory: desktop
        run: |
          rm -rf build/bin
          wails build -platform darwin/amd64

      - name: Create DMG (x86_64)
        run: |
          VERSION=${{ steps.version.outputs.version }}
          create-dmg \
            --volname "BPM" \
            --volicon "desktop/build/appicon.png" \
            --window-pos 200 120 \
            --window-size 660 400 \
            --icon-size 120 \
            --icon "BPM.app" 160 190 \
            --app-drop-link 500 190 \
            --hide-extension "BPM.app" \
            --no-internet-enable \
            "BPM-${VERSION}-darwin-x86_64.dmg" \
            "desktop/build/bin/BPM.app"

      # ── Package CLI ──
      - name: Package CLI binaries
        run: |
          VERSION=${{ steps.version.outputs.version }}
          tar -czf bpm-${VERSION}-darwin-universal.tar.gz bpm
          tar -czf bpm-${VERSION}-darwin-x86_64.tar.gz bpm-amd64

      # ── Checksums & Release ──
      - name: Generate checksums
        run: |
          VERSION=${{ steps.version.outputs.version }}
          shasum -a 256 \
            BPM-${VERSION}-darwin-universal.dmg \
            BPM-${VERSION}-darwin-x86_64.dmg \
            bpm-${VERSION}-darwin-universal.tar.gz \
            bpm-${VERSION}-darwin-x86_64.tar.gz \
            > checksums-${VERSION}-darwin.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          generate_release_notes: true
          body: |
            ## BPM ${{ steps.version.outputs.version }}

            ### Downloads (macOS)

            | File | Arch | Description |
            |------|------|-------------|
            | `BPM-${{ steps.version.outputs.version }}-darwin-universal.dmg` | Universal | 🖥️ Desktop app (Apple Silicon + Intel) |
            | `BPM-${{ steps.version.outputs.version }}-darwin-x86_64.dmg` | Intel x86_64 | 🖥️ Desktop app (Intel only) |
            | `bpm-${{ steps.version.outputs.version }}-darwin-universal.tar.gz` | Universal | ⌨️ CLI binary |
            | `bpm-${{ steps.version.outputs.version }}-darwin-x86_64.tar.gz` | Intel x86_64 | ⌨️ CLI binary |

            ### Installation

            **Desktop:**
            1. Download the `.dmg` file matching your Mac architecture
            2. Open it and drag **BPM** to **Applications**
            3. On first launch: **System Settings → Privacy & Security → Open Anyway**

            **CLI:**
            ```bash
            tar -xzf bpm-${{ steps.version.outputs.version }}-darwin-universal.tar.gz
            sudo mv bpm /usr/local/bin/
            ```

            > 💡 **Universal** builds run natively on both Apple Silicon and Intel Macs.
          files: |
            BPM-${{ steps.version.outputs.version }}-darwin-universal.dmg
            BPM-${{ steps.version.outputs.version }}-darwin-x86_64.dmg
            bpm-${{ steps.version.outputs.version }}-darwin-universal.tar.gz
            bpm-${{ steps.version.outputs.version }}-darwin-x86_64.tar.gz
            checksums-${{ steps.version.outputs.version }}-darwin.txt
